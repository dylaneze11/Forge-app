<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>FORGE — Registro de Kilómetros</title>
  <meta name="description" content="FORGE: Registrá tus kilómetros en bici o running. Desafíos, evidencia y tracking simple." />

  <!-- SVG Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E%3Ccircle cx='200' cy='200' r='190' fill='%2323271a' stroke='%23748c41' stroke-width='4'/%3E%3Cpolygon points='200,105 270,145 270,225 200,265 130,225 130,145' fill='%2323271a' stroke='%23748c41' stroke-width='5.5'/%3E%3C/svg%3E" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Apply theme immediately to prevent flash -->
  <script>
    (function() {
      var theme = localStorage.getItem('forge_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES — DARK THEME (default)
    ============================================================ */
    :root[data-theme="dark"] {
      --bg-primary: #0a0a0f;
      --bg-surface: rgba(255,255,255,0.05);
      --bg-surface-hover: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(0,255,136,0.4);
      --text-primary: #e8e8f0;
      --text-secondary: #888899;
      --accent-green: #00ff88;
      --accent-red: #ff3e6c;
      --accent-glow: rgba(0,255,136,0.3);
      --accent-red-glow: rgba(255,62,108,0.3);
      --map-filter: none;
      --input-bg: rgba(255,255,255,0.07);
      --input-border: rgba(255,255,255,0.15);
      --btn-secondary-bg: rgba(255,255,255,0.08);
      --btn-secondary-text: #e8e8f0;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
      --metric-flash: #ffffff;
    }

    /* ============================================================
       CSS CUSTOM PROPERTIES — LIGHT THEME
    ============================================================ */
    :root[data-theme="light"] {
      --bg-primary: #f0f2f5;
      --bg-surface: rgba(255,255,255,0.85);
      --bg-surface-hover: rgba(255,255,255,0.97);
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,184,92,0.5);
      --text-primary: #0a0a0f;
      --text-secondary: #555566;
      --accent-green: #00b85c;
      --accent-red: #e0234e;
      --accent-glow: rgba(0,184,92,0.2);
      --accent-red-glow: rgba(224,35,78,0.2);
      --map-filter: none;
      --input-bg: rgba(0,0,0,0.04);
      --input-border: rgba(0,0,0,0.15);
      --btn-secondary-bg: rgba(0,0,0,0.06);
      --btn-secondary-text: #0a0a0f;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.1);
      --metric-flash: #00b85c;
    }

    /* ============================================================
       GLOBAL RESET & BASE STYLES
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s, border 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    /* ============================================================
       SCREEN TRANSITION SYSTEM
    ============================================================ */
    .screen-wrapper {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .screen-enter {
      animation: fadeIn 0.3s ease forwards;
    }

    .screen-exit {
      animation: fadeOut 0.2s ease forwards;
      pointer-events: none;
    }

    /* ============================================================
       TYPOGRAPHY
    ============================================================ */
    .font-display {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.05em;
    }

    /* ============================================================
       LOGIN SCREEN
    ============================================================ */
    .login-screen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.07) 0%, transparent 60%),
        radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
      background-size: auto, 24px 24px;
      position: relative;
      overflow: hidden;
    }

    .login-container {
      width: 100%;
      max-width: 380px;
      padding: 0 24px;
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .login-logo-text {
      display: none;
    }

    .login-tagline {
      font-size: 15px;
      font-style: italic;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 40px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Staggered animation entries */
    .anim-entry {
      opacity: 0;
      animation: slideUp 0.5s ease forwards;
    }
    .anim-entry:nth-child(1) { animation-delay: 0.05s; }
    .anim-entry:nth-child(2) { animation-delay: 0.15s; }
    .anim-entry:nth-child(3) { animation-delay: 0.25s; }
    .anim-entry:nth-child(4) { animation-delay: 0.35s; }
    .anim-entry:nth-child(5) { animation-delay: 0.45s; }
    .anim-entry:nth-child(6) { animation-delay: 0.55s; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s, background 0.3s;
    }

    .form-input:focus {
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-input::placeholder {
      color: var(--text-secondary);
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--accent-green);
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      box-shadow: 0 0 24px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Ripple effect */
    .btn-primary .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,0.2);
      transform: scale(0);
      animation: ripple-anim 0.5s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    .login-hint {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
    }

    .login-error {
      background: rgba(255,62,108,0.1);
      border: 1px solid var(--accent-red);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--accent-red);
      text-align: center;
    }

    /* ============================================================
       HEADER ACTIONS (logout, theme toggle)
    ============================================================ */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      background: var(--btn-secondary-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s, border 0.2s, box-shadow 0.2s;
      color: var(--text-primary);
    }

    .icon-btn:hover {
      border-color: var(--accent-green);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-surface);
      border: 1px solid var(--accent-green);
      border-radius: 6px;
      padding: 12px 20px;
      font-size: 14px;
      color: var(--text-primary);
      z-index: 9999;
      animation: toastIn 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 12px var(--accent-glow);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ============================================================
       REGISTRO SCREEN — Formulario de carga de kilómetros
    ============================================================ */
    .registro-screen {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .registro-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .registro-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--accent-green);
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .registro-content {
      padding: 20px;
      flex: 1;
    }

    .registro-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .registro-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .registro-form-group {
      display: flex;
      flex-direction: column;
    }

    .registro-disclaimer {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
      font-style: italic;
    }

    /* Toggle de selección bici / corriendo */
    .tipo-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .tipo-option {
      flex: 1;
      padding: 12px;
      background: var(--input-bg);
      border: none;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tipo-option.active {
      background: var(--accent-green);
      color: #000;
      font-weight: 600;
    }

    .tipo-option:not(.active):hover {
      background: var(--bg-surface-hover);
    }

    /* Photo upload */
    .photo-upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border 0.2s, background 0.2s;
      position: relative;
    }

    .photo-upload-area:hover {
      border-color: var(--accent-green);
      background: var(--bg-surface);
    }

    .photo-upload-area.has-image {
      border-style: solid;
      border-color: var(--accent-green);
    }

    .photo-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 6px;
      display: block;
      margin: 0 auto;
    }

    .photo-placeholder {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .photo-placeholder-icon {
      font-size: 32px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .photo-remove-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 14px;
      font-size: 12px;
      background: rgba(255,62,108,0.12);
      border: 1px solid rgba(255,62,108,0.3);
      border-radius: 4px;
      color: var(--accent-red);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .photo-remove-btn:hover {
      background: rgba(255,62,108,0.2);
    }

    #photo-input {
      display: none;
    }

    /* Historial de registros */
    .registro-historial {
      margin-top: 32px;
    }

    .historial-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .historial-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      transition: border 0.2s;
    }

    .historial-card:hover {
      border-color: var(--border-hover);
    }

    .historial-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .historial-km {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: var(--accent-green);
      line-height: 1;
      text-shadow: 0 0 8px var(--accent-glow);
    }

    .historial-tipo {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .historial-tipo.bici {
      background: rgba(0,184,92,0.12);
      color: var(--accent-green);
    }

    .historial-tipo.corriendo {
      background: rgba(255,62,108,0.12);
      color: var(--accent-red);
    }

    .historial-detail {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .histarial-fecha {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }

    .empty-state-text {
      font-size: 13px;
      line-height: 1.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-green);
    }

    /* ============================================================
       USER DETAIL SCREEN — Mi Actividad
    ============================================================ */
    .detail-screen {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .detail-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .detail-back-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      transition: border 0.2s;
    }
    .detail-back-btn:hover {
      border-color: var(--accent-green);
    }

    .detail-topbar-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .detail-content {
      padding: 16px;
    }

    /* Hero */
    .detail-hero {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
    }

    .detail-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--accent-green);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .detail-hero-info {
      flex: 1;
      min-width: 0;
    }

    .detail-hero-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .detail-hero-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .detail-tags {
      display: flex;
      gap: 5px;
      margin-top: 7px;
      flex-wrap: wrap;
    }

    .d-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .d-tag.active {
      background: rgba(0,255,136,0.12);
      color: var(--accent-green);
    }
    .d-tag.info {
      background: rgba(0,184,255,0.12);
      color: #00b8ff;
    }
    .d-tag.warn {
      background: rgba(255,184,0,0.12);
      color: #ffb800;
    }

    /* Stats grid */
    .detail-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .detail-stat-item {
      background: var(--bg-surface);
      padding: 11px 12px;
    }
    .detail-stat-label {
      font-size: 9px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }
    .detail-stat-val {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .detail-stat-sub {
      font-size: 9px;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    /* Tabs */
    .detail-tabs-row {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      border-radius: 10px 10px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .detail-tab {
      padding: 10px 16px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
      transition: color 0.2s, border 0.2s;
    }
    .detail-tab.active {
      color: var(--accent-green);
      border-bottom-color: var(--accent-green);
    }
    .detail-tab:hover {
      color: var(--text-primary);
    }
    .detail-tab-count {
      font-size: 9px;
      background: var(--bg-surface-hover);
      border-radius: 20px;
      padding: 1px 5px;
      color: var(--text-secondary);
    }

    .detail-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* Filter pills */
    .detail-filter {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .detail-filter-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-right: 2px;
    }

    .d-pill {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .d-pill.active {
      background: rgba(0,255,136,0.1);
      color: var(--accent-green);
      border-color: var(--accent-green);
    }
    .d-pill:hover {
      border-color: var(--accent-green);
    }

    /* History items */
    .d-history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .d-history-item:last-child { border-bottom: none; }
    .d-history-item:hover { background: var(--bg-surface-hover); }

    .d-act-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }
    .d-act-icon.bici { background: rgba(0,184,255,0.1); }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ============================================================
   CONSTANTS & UTILITIES
============================================================ */

/**
 * Format a date object to readable string
 */
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('es-AR', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

/**
 * Generate a unique ID
 */
function genId() {
  return `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
}

/* ============================================================
   localStorage HELPERS
============================================================ */

function getUsers() {
  try {
    const raw = localStorage.getItem('forge_users');
    if (!raw) return { usuarios: {} };
    return JSON.parse(raw);
  } catch { return { usuarios: {} }; }
}

function saveUsers(data) {
  localStorage.setItem('forge_users', JSON.stringify(data));
}

function getSession() {
  return localStorage.getItem('forge_session') || null;
}

function setSession(username) {
  if (username) localStorage.setItem('forge_session', username);
  else localStorage.removeItem('forge_session');
}

function getTheme() {
  return localStorage.getItem('forge_theme') || 'dark';
}

function setThemePref(theme) {
  localStorage.setItem('forge_theme', theme);
  document.documentElement.setAttribute('data-theme', theme);
}

/* ============================================================
   RIPPLE EFFECT HOOK
============================================================ */

function addRipple(e) {
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const span = document.createElement('span');
  span.className = 'ripple';
  span.style.left = `${x}px`;
  span.style.top  = `${y}px`;
  span.style.width = span.style.height = '100px';
  span.style.marginLeft = '-50px';
  span.style.marginTop  = '-50px';
  btn.appendChild(span);
  setTimeout(() => span.remove(), 600);
}

/* ============================================================
   TOAST COMPONENT
============================================================ */

function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2500);
    return () => clearTimeout(t);
  }, []);
  return <div className="toast">{message}</div>;
}

/* ============================================================
   SCREEN 1 — LOGIN
============================================================ */

function LoginScreen({ onLogin, theme, onToggleTheme }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');

  const ADMIN_EMAIL = 'seoanedylan10@gmail.com';
  const ADMIN_PASS  = 'Forge2709@';

  const handleSubmit = (e) => {
    e.preventDefault();
    const trimUser = username.trim();
    if (!trimUser || !password) {
      setError('Completá los dos campos para continuar.');
      return;
    }
    if (trimUser.length < 2) {
      setError('El nombre debe tener al menos 2 caracteres.');
      return;
    }

    // Admin check
    if (trimUser === ADMIN_EMAIL) {
      if (password !== ADMIN_PASS) {
        setError('Credenciales de administrador incorrectas.');
        return;
      }
      const data = getUsers();
      if (!data.usuarios[ADMIN_EMAIL]) {
        data.usuarios[ADMIN_EMAIL] = { password: ADMIN_PASS, registros: [] };
        saveUsers(data);
      } else if (data.usuarios[ADMIN_EMAIL].password !== ADMIN_PASS) {
        data.usuarios[ADMIN_EMAIL].password = ADMIN_PASS;
        saveUsers(data);
      }
      setSession(trimUser);
      onLogin(trimUser);
      return;
    }

    const data = getUsers();
    if (data.usuarios[trimUser]) {
      if (data.usuarios[trimUser].password !== password) {
        setError('Contraseña incorrecta. Intentá de nuevo.');
        return;
      }
    } else {
      data.usuarios[trimUser] = { password, registros: [] };
      saveUsers(data);
    }

    setSession(trimUser);
    onLogin(trimUser);
  };

  return (
    <div className="login-screen">
      {/* Theme toggle */}
      <div style={{ position: 'absolute', top: 20, right: 20 }}>
        <button className="icon-btn" onClick={onToggleTheme} title="Cambiar tema" id="login-theme-toggle">
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
      </div>

      <div className="login-container">
        {/* Logo */}
        <div className="login-logo anim-entry">
          <svg width="160" height="160" viewBox="0 0 400 400" fill="none" style={{ filter: 'drop-shadow(0 10px 20px rgba(0,0,0,0.3))' }}>
            {/* Círculo de fondo */}
            <circle cx="200" cy="200" r="190" fill="#23271a" stroke="#748c41" strokeWidth="4" />
            
            {/* Anillo interior decorativo */}
            <circle cx="200" cy="200" r="178" fill="none" stroke="#748c41" strokeWidth="1.5" opacity="0.6" />

            {/* Hebilla superior */}
            <rect x="175" y="32" width="50" height="12" rx="3" fill="#c3a763" stroke="#927b40" strokeWidth="1.5" />
            <rect x="183" y="36" width="34" height="4" rx="2" fill="#23271a" />

            {/* Cinta (Franjas degradadas) */}
            <path d="M 160 44 L 176 44 L 200 102 Z" fill="#3f561d" />
            <path d="M 176 44 L 192 44 L 200 102 Z" fill="#839d3f" />
            <path d="M 192 44 L 208 44 L 200 102 Z" fill="#a5c363" />
            <path d="M 208 44 L 224 44 L 200 102 Z" fill="#839d3f" />
            <path d="M 224 44 L 240 44 L 200 102 Z" fill="#3f561d" />
            
            {/* Anillo de conexión inferior */}
            <rect x="192" y="98" width="16" height="6" rx="1.5" fill="#c3a763" />

            {/* Medalla Hexagonal */}
            <polygon points="200,105 270,145 270,225 200,265 130,225 130,145" fill="#23271a" stroke="#748c41" strokeWidth="5.5" strokeLinejoin="round" />

            {/* Ruta de running */}
            <path d="M 160 215 L 160 190 L 182 170 L 205 170 L 218 140 L 230 160 L 230 178 L 216 178 L 226 190 L 246 190" fill="none" stroke="#748c41" strokeWidth="4.5" strokeLinecap="round" strokeLinejoin="round" />

            {/* Círculo de inicio de ruta */}
            <circle cx="160" cy="215" r="7" fill="#23271a" stroke="#748c41" strokeWidth="2.5" />
            <circle cx="160" cy="215" r="2.5" fill="#748c41" />

            {/* Estrella de fin de ruta */}
            <polygon points="254,180 257.5,187 265,187 259,191.5 261,198 254,194 247,198 249,191.5 243,187 250.5,187" fill="#748c41" />

            {/* Texto "FORGE" */}
            <text x="200" y="325" fill="#edeae0" fontSize="54" fontFamily="'Bebas Neue', sans-serif" fontWeight="bold" textAnchor="middle" letterSpacing="6">FORGE</text>

            {/* Texto "FINISHER CHALLENGES" */}
            <text x="200" y="358" fill="#748c41" fontSize="13.5" fontFamily="'DM Sans', sans-serif" fontWeight="500" textAnchor="middle" letterSpacing="4.5">FINISHER CHALLENGES</text>
          </svg>
        </div>

        <p className="login-tagline anim-entry">Cada kilómetro cuenta.</p>

        <form className="login-form" onSubmit={handleSubmit}>
          <input
            id="login-username"
            className="form-input anim-entry"
            type="text"
            placeholder="Nombre de usuario"
            value={username}
            onChange={e => { setUsername(e.target.value); setError(''); }}
            autoComplete="username"
            autoCapitalize="none"
          />
          <input
            id="login-password"
            className="form-input anim-entry"
            type="password"
            placeholder="Contraseña"
            value={password}
            onChange={e => { setPassword(e.target.value); setError(''); }}
            autoComplete="current-password"
          />
          {error && <div className="login-error anim-entry">{error}</div>}
          <button
            id="login-submit-btn"
            className="btn-primary anim-entry"
            type="submit"
            onClick={addRipple}
          >
            COMENZAR
          </button>
          <p className="login-hint anim-entry">
            ¿Primera vez? Tu cuenta se crea automáticamente.
          </p>
        </form>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN 2 — REGISTRO DE KILÓMETROS
============================================================ */

function RegistroScreen({ username, theme, onToggleTheme, onLogout, onViewDetail, isAdmin }) {
  const [nombre, setNombre] = useState('');
  const [email, setEmail] = useState('');
  const [tipo, setTipo] = useState('corriendo');
  const [km, setKm] = useState('');
  const [nota, setNota] = useState('');
  const [foto, setFoto] = useState(null);
  const [toast, setToast] = useState('');
  const [registros, setRegistros] = useState([]);

  // Cargar historial al montar
  useEffect(() => {
    const data = getUsers();
    const user = data.usuarios[username];
    if (user) setRegistros([...(user.registros || [])].reverse());
  }, [username]);

  const showToast = (msg) => setToast(msg);

  const handlePhoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setFoto(ev.target.result);
    reader.readAsDataURL(file);
  };

  const removePhoto = () => {
    setFoto(null);
    document.getElementById('photo-input').value = '';
  };

  const handleSubmit = (e) => {
    e.preventDefault();

    if (!nombre.trim()) { showToast('Completá tu nombre y apellido'); return; }
    if (!email.trim() || !email.includes('@')) { showToast('Ingresá un email válido'); return; }
    const kmNum = parseFloat(km);
    if (isNaN(kmNum) || kmNum <= 0) { showToast('Ingresá un número válido de kilómetros'); return; }

    const registro = {
      id: genId(),
      nombre: nombre.trim(),
      email: email.trim(),
      tipo,
      kilometros: kmNum,
      nota: nota.trim(),
      foto: foto || null,
      fecha: new Date().toISOString(),
    };

    // Guardar en localStorage
    const data = getUsers();
    const user = data.usuarios[username];
    if (user) {
      if (!user.registros) user.registros = [];
      user.registros.push(registro);
      saveUsers(data);
    }

    // Resetear formulario
    setNombre('');
    setEmail('');
    setKm('');
    setNota('');
    setFoto(null);
    document.getElementById('photo-input').value = '';

    // Actualizar historial
    setRegistros([registro, ...registros]);
    showToast('✅ Kilómetros registrados con éxito');
  };

  const totalKm = registros.reduce((s, r) => s + (r.kilometros || 0), 0);
  const totalRegistros = registros.length;

  return (
    <div className="registro-screen">
      {/* Header */}
      <div className="registro-header">
        <span className="registro-title">FORGE</span>
        <div className="header-actions">
          {isAdmin && (
            <button className="icon-btn" onClick={onViewDetail} title="Mi actividad" id="registro-detail-btn" style={{ fontSize: 18 }}>
              📊
            </button>
          )}
          <button className="icon-btn" onClick={onToggleTheme} title="Cambiar tema" id="registro-theme-toggle">
            {theme === 'dark' ? '☀️' : '🌙'}
          </button>
          <button className="icon-btn" onClick={onLogout} title="Cerrar sesión" id="registro-logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16,17 21,12 16,7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <div className="registro-content">
        {/* Resumen rápido */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 24 }}>
          <div className="stat-card" style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '14px 12px', textAlign: 'center' }}>
            <div className="stat-value" style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, color: 'var(--accent-green)', textShadow: '0 0 10px var(--accent-glow)' }}>{totalRegistros}</div>
            <div className="stat-label" style={{ fontSize: 10, color: 'var(--text-secondary)', textTransform: 'uppercase', marginTop: 4 }}>Registros</div>
          </div>
          <div className="stat-card" style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '14px 12px', textAlign: 'center' }}>
            <div className="stat-value" style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, color: 'var(--accent-green)', textShadow: '0 0 10px var(--accent-glow)' }}>{totalKm.toFixed(1)}</div>
            <div className="stat-label" style={{ fontSize: 10, color: 'var(--text-secondary)', textTransform: 'uppercase', marginTop: 4 }}>Km totales</div>
          </div>
        </div>

        {/* Formulario */}
        <form className="registro-form" onSubmit={handleSubmit}>
          <div className="registro-form-group anim-entry">
            <label className="registro-label">Nombre y Apellido</label>
            <input
              className="form-input"
              type="text"
              placeholder="Ej: Juan Pérez"
              value={nombre}
              onChange={e => setNombre(e.target.value)}
              autoComplete="name"
            />
          </div>

          <div className="registro-form-group anim-entry">
            <label className="registro-label">Email</label>
            <input
              className="form-input"
              type="email"
              placeholder="ejemplo@correo.com"
              value={email}
              onChange={e => setEmail(e.target.value)}
              autoComplete="email"
            />
          </div>

          <div className="registro-form-group anim-entry">
            <label className="registro-label">Desafío</label>
            <div className="tipo-toggle">
              <button
                type="button"
                className={`tipo-option ${tipo === 'corriendo' ? 'active' : ''}`}
                onClick={() => setTipo('corriendo')}
              >
                🏃 Corriendo
              </button>
              <button
                type="button"
                className={`tipo-option ${tipo === 'bici' ? 'active' : ''}`}
                onClick={() => setTipo('bici')}
              >
                🚴 En bici
              </button>
            </div>
          </div>

          <div className="registro-form-group anim-entry">
            <label className="registro-label">Kilómetros</label>
            <input
              className="form-input"
              type="text"
              inputMode="decimal"
              placeholder="Ej: 15.5"
              value={km}
              onChange={e => {
                const val = e.target.value;
                if (val === '' || /^\d*\.?\d{0,2}$/.test(val)) setKm(val);
              }}
            />
            <span className="registro-disclaimer">Solo ingresar números. Ej: 15.5</span>
          </div>

          <div className="registro-form-group anim-entry">
            <label className="registro-label">Nota (opcional)</label>
            <textarea
              className="form-input"
              style={{ minHeight: 80, resize: 'vertical', fontFamily: "'DM Sans', sans-serif" }}
              placeholder="Describí tu actividad, ruta, condiciones..."
              value={nota}
              onChange={e => setNota(e.target.value)}
            />
          </div>

          <div className="registro-form-group anim-entry">
            <label className="registro-label">Foto / Evidencia (opcional)</label>
            <div
              className={`photo-upload-area ${foto ? 'has-image' : ''}`}
              onClick={() => document.getElementById('photo-input').click()}
            >
              <input
                id="photo-input"
                type="file"
                accept="image/*"
                onChange={handlePhoto}
              />
              {foto ? (
                <>
                  <img src={foto} alt="Evidencia" className="photo-preview" />
                  <button
                    type="button"
                    className="photo-remove-btn"
                    onClick={(e) => { e.stopPropagation(); removePhoto(); }}
                  >
                    ❌ Quitar foto
                  </button>
                </>
              ) : (
                <div className="photo-placeholder">
                  <div className="photo-placeholder-icon">📷</div>
                  <span>Tocá para subir una foto de tu actividad</span>
                </div>
              )}
            </div>
          </div>

          <button
            type="submit"
            className="btn-primary anim-entry"
            onClick={addRipple}
            id="btn-registrar-km"
          >
            REGISTRAR KILÓMETROS
          </button>
        </form>

        {/* Historial */}
        <div className="registro-historial">
          <div className="historial-title">Historial de registros</div>

          {registros.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">📊</div>
              <div className="empty-state-title">Sin registros aún</div>
              <div className="empty-state-text">
                Completá el formulario de arriba para registrar tus primeros kilómetros.
              </div>
            </div>
          ) : (
            registros.map((r, idx) => (
              <div key={r.id} className="historial-card" style={{ animationDelay: `${idx * 0.05}s` }}>
                <div className="historial-card-top">
                  <span className="historial-km">{r.kilometros.toFixed(1)} <span style={{ fontSize: 14, color: 'var(--text-secondary)' }}>km</span></span>
                  <span className={`historial-tipo ${r.tipo}`}>
                    {r.tipo === 'bici' ? '🚴 BICI' : '🏃 CORRIENDO'}
                  </span>
                </div>
                <div className="historial-detail">
                  {r.nombre}
                  {r.nota && <span> — {r.nota.length > 60 ? r.nota.slice(0, 60) + '…' : r.nota}</span>}
                </div>
                <div className="histarial-fecha">{formatDate(r.fecha)}</div>
              </div>
            ))
          )}
        </div>

        <div style={{ height: 40 }} />
      </div>

      {/* Toast */}
      {toast && <Toast message={toast} onDone={() => setToast('')} />}
    </div>
  );
}

/* ============================================================
   SCREEN 3 — MI ACTIVIDAD / USER DETAIL
============================================================ */

function UserDetailScreen({ username, onBack, theme, onToggleTheme }) {
  const [tab, setTab] = useState('historial');
  const [filter, setFilter] = useState('todos');
  const [showAll, setShowAll] = useState(false);
  const [userData, setUserData] = useState(null);

  useEffect(() => {
    const data = getUsers();
    const u = data.usuarios[username];
    if (u) setUserData(u);
  }, [username]);

  if (!userData) return null;

  const registros = userData.registros || [];
  const totalKm = registros.reduce((s, r) => s + (r.kilometros || 0), 0);
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();
  const monthKm = registros
    .filter(r => { const d = new Date(r.fecha); return d.getMonth() === thisMonth && d.getFullYear() === thisYear; })
    .reduce((s, r) => s + (r.kilometros || 0), 0);
  const photos = registros.filter(r => r.foto);

  let filtered = [...registros];
  if (filter === 'bici') filtered = filtered.filter(r => r.tipo === 'bici');
  else if (filter === 'corriendo') filtered = filtered.filter(r => r.tipo === 'corriendo');
  else if (filter === 'con-foto') filtered = filtered.filter(r => r.foto);

  const displayRegistros = showAll ? filtered : filtered.slice(0, 5);
  const sortedPhotos = [...photos].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
  const displayPhotos = showAll ? sortedPhotos : sortedPhotos.slice(0, 9);

  const getInitials = (name) => {
    if (!name) return username.slice(0, 2).toUpperCase();
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  };

  const shortDate = (d) => {
    const dt = new Date(d);
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${dt.getDate()} ${months[dt.getMonth()]}`;
  };

  const shortTime = (d) => {
    return new Date(d).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  };

  const lastReg = registros.length > 0 ? registros[registros.length - 1] : null;
  const lastRegDays = lastReg ? Math.floor((now - new Date(lastReg.fecha).getTime()) / 86400000) : null;

  const kmByWeek = (() => {
    const weeks = [0,0,0,0,0,0];
    registros.forEach(r => {
      const d = new Date(r.fecha);
      const diff = Math.floor((now - d.getTime()) / 604800000);
      if (diff >= 0 && diff < 6) weeks[5 - diff] += r.kilometros || 0;
    });
    return weeks;
  })();

  return (
    <div className="detail-screen">
      <div className="detail-topbar">
        <button className="detail-back-btn" onClick={onBack}>← Volver</button>
        <div>
          <div className="detail-topbar-title">Mi Actividad</div>
          <div style={{ fontSize: 10, color: 'var(--text-secondary)' }}>{username}</div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
          <button className="icon-btn" onClick={onToggleTheme} title="Cambiar tema" style={{ width: 34, height: 34, fontSize: 14 }}>
            {theme === 'dark' ? '☀️' : '🌙'}
          </button>
        </div>
      </div>

      <div className="detail-content">
        {/* Hero */}
        <div className="detail-hero">
          <div className="detail-avatar">
            {lastReg ? getInitials(lastReg.nombre) : username.slice(0, 2).toUpperCase()}
          </div>
          <div className="detail-hero-info">
            <div className="detail-hero-name">{lastReg ? lastReg.nombre : username}</div>
            <div className="detail-hero-sub">
              {lastReg ? lastReg.email : ''} · {lastRegDays !== null ? `Último registro hace ${lastRegDays} día${lastRegDays !== 1 ? 's' : ''}` : 'Sin registros'}
            </div>
            <div className="detail-tags">
              <span className="d-tag active">Activo</span>
              {registros.some(r => r.tipo === 'bici') && <span className="d-tag info">Ciclista</span>}
              {registros.some(r => r.tipo === 'corriendo') && <span className="d-tag warn">Runner</span>}
              <span className="d-tag active">{registros.length} registros</span>
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
            <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2, height: 32 }}>
              {kmByWeek.map((v, i) => (
                <div key={i}
                  style={{
                    width: 8,
                    height: Math.max(4, Math.min(32, (v / (Math.max(...kmByWeek) || 1)) * 30)),
                    borderRadius: '2px 2px 0 0',
                    background: i === 5 ? 'var(--accent-green)' : 'var(--bg-surface-hover)',
                    border: i === 5 ? '1px solid var(--accent-green)' : '1px solid var(--border)',
                  }}
                />
              ))}
            </div>
            <div style={{ fontSize: 9, color: 'var(--text-secondary)' }}>6 semanas</div>
          </div>
        </div>

        {/* Stats grid */}
        <div className="detail-stats">
          <div className="detail-stat-item">
            <div className="detail-stat-label">Km totales</div>
            <div className="detail-stat-val">{totalKm.toFixed(1)}</div>
            <div className="detail-stat-sub">desde el inicio</div>
          </div>
          <div className="detail-stat-item">
            <div className="detail-stat-label">Km este mes</div>
            <div className="detail-stat-val">{monthKm.toFixed(1)}</div>
            <div className="detail-stat-sub">{now.toLocaleString('es-AR', { month: 'long' })}</div>
          </div>
          <div className="detail-stat-item">
            <div className="detail-stat-label">Registros</div>
            <div className="detail-stat-val">{registros.length}</div>
            <div className="detail-stat-sub">
              {registros.filter(r => r.tipo === 'bici').length} bici · {registros.filter(r => r.tipo === 'corriendo').length} running
            </div>
          </div>
          <div className="detail-stat-item">
            <div className="detail-stat-label">Evidencias</div>
            <div className="detail-stat-val">{photos.length}</div>
            <div className="detail-stat-sub">{photos.length} fotos subidas</div>
          </div>
        </div>

        {/* Tabs */}
        <div className="detail-tabs-row">
          <div className={`detail-tab ${tab === 'historial' ? 'active' : ''}`} onClick={() => { setTab('historial'); setShowAll(false); }}>
            📋 Historial <span className="detail-tab-count">{registros.length}</span>
          </div>
          <div className={`detail-tab ${tab === 'fotos' ? 'active' : ''}`} onClick={() => { setTab('fotos'); setShowAll(false); }}>
            📷 Fotos <span className="detail-tab-count">{photos.length}</span>
          </div>
          <div className={`detail-tab ${tab === 'desafios' ? 'active' : ''}`} onClick={() => { setTab('desafios'); setShowAll(false); }}>
            🏆 Desafíos
          </div>
        </div>

        {/* Panel: Historial */}
        {tab === 'historial' && (
          <div className="detail-panel">
            <div className="detail-filter">
              <span className="detail-filter-label">Filtrar:</span>
              {['todos', 'bici', 'corriendo', 'con-foto'].map(f => (
                <button key={f} className={`d-pill ${filter === f ? 'active' : ''}`} onClick={() => { setFilter(f); setShowAll(false); }}>
                  {f === 'todos' ? 'Todos' : f === 'bici' ? '🚴 Bici' : f === 'corriendo' ? '🏃 Running' : '📷 Con foto'}
                </button>
              ))}
            </div>

            {displayRegistros.length === 0 ? (
              <div className="empty-state" style={{ padding: '24px 16px' }}>
                <div className="empty-state-title">Sin resultados</div>
                <div className="empty-state-text">No hay registros con este filtro.</div>
              </div>
            ) : (
              displayRegistros.map((r) => (
                <div key={r.id} className="d-history-item">
                  <div className={`d-act-icon ${r.tipo}`}>
                    {r.tipo === 'bici' ? '🚴' : '🏃'}
                  </div>
                  <div className="d-date-col">
                    <div className="d-date-day">{shortDate(r.fecha)}</div>
                    <div className="d-date-time">{shortTime(r.fecha)}</div>
                  </div>
                  <div className="d-act-main">
                    <div className="d-act-title">{r.nombre || (r.tipo === 'bici' ? 'Salida en bici' : 'Running')}</div>
                    <div className="d-act-meta">
                      <span>{r.nota ? r.nota.slice(0, 30) + (r.nota.length > 30 ? '…' : '') : 'Sin nota'}</span>
                      {r.foto && <span>📷 1 foto</span>}
                    </div>
                  </div>
                  <div className="d-mini-map">
                    {r.tipo === 'bici' ? '🚴' : '🏃'}
                  </div>
                  <div className={`d-km-pill ${!r.foto ? 'warn' : ''}`}>
                    {r.kilometros.toFixed(1)} km
                  </div>
                  <div className={`d-verify ${r.foto ? 'ok' : 'warn'}`} title={r.foto ? 'Con evidencia' : 'Sin evidencia'}></div>
                </div>
              ))
            )}

            {filtered.length > 5 && (
              <div className="d-load-more">
                <button className="d-load-btn" onClick={() => setShowAll(!showAll)}>
                  {showAll ? 'Mostrar menos' : `Ver los ${filtered.length} registros`}
                </button>
              </div>
            )}
          </div>
        )}

        {/* Panel: Fotos */}
        {tab === 'fotos' && (
          <div className="detail-panel">
            {sortedPhotos.length === 0 ? (
              <div className="empty-state" style={{ padding: '32px 16px' }}>
                <div className="empty-state-icon" style={{ fontSize: 32 }}>📷</div>
                <div className="empty-state-title">Sin fotos aún</div>
                <div className="empty-state-text">Subí fotos al registrar kilómetros para verlas acá.</div>
              </div>
            ) : (
              <>
                <div className="d-photos-header">
                  <span className="d-photos-count">{photos.length} foto{photos.length !== 1 ? 's' : ''}</span>
                </div>
                <div className="d-photos-grid">
                  {displayPhotos.map((r) => (
                    <div key={r.id} className="d-photo-card">
                      {r.foto && r.foto.startsWith('data:image') ? (
                        <img src={r.foto} alt="Evidencia" className="d-photo-img" />
                      ) : (
                        <div className="d-photo-placeholder" style={{ background: r.tipo === 'bici' ? 'rgba(0,184,255,0.08)' : 'rgba(255,62,108,0.08)' }}>
                          <span style={{ fontSize: 20 }}>{r.tipo === 'bici' ? '🚴' : '🏃'}</span>
                          <span>{shortDate(r.fecha)}</span>
                        </div>
                      )}
                      <div className={`d-photo-verify ${r.foto ? 'ok' : 'warn'}`}>{r.foto ? '✓' : '!'}</div>
                      <div className="d-photo-badge">{r.kilometros.toFixed(1)} km</div>
                      <div className="d-photo-overlay">
                        <div className="d-photo-overlay-text">{r.nota ? r.nota.slice(0, 25) + (r.nota.length > 25 ? '…' : '') : shortDate(r.fecha)}</div>
                      </div>
                    </div>
                  ))}
                </div>
                {photos.length > 9 && (
                  <div className="d-load-more">
                    <button className="d-load-btn" onClick={() => setShowAll(!showAll)}>
                      {showAll ? 'Mostrar menos' : `Ver las ${photos.length} fotos`}
                    </button>
                  </div>
                )}
              </>
            )}
          </div>
        )}

        {/* Panel: Desafíos */}
        {tab === 'desafios' && (
          <div className="detail-panel">
            {(() => {
              const bikeKm = registros.filter(r => r.tipo === 'bici').reduce((s, r) => s + (r.kilometros || 0), 0);
              const runKm = registros.filter(r => r.tipo === 'corriendo').reduce((s, r) => s + (r.kilometros || 0), 0);
              const challenges = [
                { name: 'Rodando en bici', desc: `${bikeKm.toFixed(0)} km de 200 km · acumulado total`, prog: Math.min(100, (bikeKm / 200) * 100), status: bikeKm >= 200 ? 'done' : 'active', icon: '🚴' },
                { name: 'Running total', desc: `${runKm.toFixed(0)} km de 50 km · acumulado total`, prog: Math.min(100, (runKm / 50) * 100), status: runKm >= 50 ? 'done' : 'active', icon: '🏃' },
                { name: 'Meta mensual', desc: `${monthKm.toFixed(0)} km de 100 km · ${now.toLocaleString('es-AR', { month: 'long' })}`, prog: Math.min(100, (monthKm / 100) * 100), status: monthKm >= 100 ? 'done' : 'active', icon: '📅' },
                { name: 'Consistencia', desc: `${registros.length} de 10 registros · primera meta`, prog: Math.min(100, (registros.length / 10) * 100), status: registros.length >= 10 ? 'done' : 'active', icon: '🔥' },
                { name: 'Desafío total', desc: `${totalKm.toFixed(0)} km de 500 km · meta global`, prog: Math.min(100, (totalKm / 500) * 100), status: totalKm >= 500 ? 'done' : 'active', icon: '🏆' },
              ];
              return challenges.map((ch, i) => (
                <div key={i} className="d-chall-item">
                  <div className="d-chall-icon">{ch.icon}</div>
                  <div className="d-chall-info">
                    <div className="d-chall-name">{ch.name}</div>
                    <div className="d-chall-desc">{ch.desc}</div>
                    <div className="d-chall-bar"><div className="d-chall-fill" style={{ width: `${ch.prog}%` }}></div></div>
                  </div>
                  <div className="d-chall-pct">{Math.round(ch.prog)}%</div>
                  <span className={`d-chall-status ${ch.status}`}>{ch.status === 'done' ? 'Completado' : 'En curso'}</span>
                </div>
              ));
            })()}
          </div>
        )}

        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP — STATE MACHINE & NAVIGATION
=========================================================== */

function App() {
  const [theme, setTheme]     = useState(getTheme);
  const [screen, setScreen]   = useState('login');
  const [username, setUsername] = useState('');
  const [transitioning, setTransitioning] = useState(false);

  // Restore session on mount
  useEffect(() => {
    const session = getSession();
    if (session) {
      const data = getUsers();
      if (data.usuarios[session]) {
        setUsername(session);
        navigateTo('registro');
      }
    }
  }, []);

  const handleToggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    setThemePref(next);
  };

  const navigateTo = (newScreen) => {
    if (transitioning) return;
    setTransitioning(true);
    setTimeout(() => {
      setScreen(newScreen);
      setTransitioning(false);
    }, 200);
  };

  const handleLogin = (user) => {
    setUsername(user);
    navigateTo('registro');
  };

  const handleLogout = () => {
    setSession(null);
    setUsername('');
    navigateTo('login');
  };

  const screenClass = `screen-wrapper ${transitioning ? 'screen-exit' : 'screen-enter'}`;

  const sharedProps = { theme, onToggleTheme: handleToggleTheme };
  const isAdmin = username === 'seoanedylan10@gmail.com';

  return (
    <div className={screenClass}>
      {screen === 'login' && (
        <LoginScreen onLogin={handleLogin} {...sharedProps} />
      )}
      {screen === 'registro' && (
        <RegistroScreen
          username={username}
          onLogout={handleLogout}
          onViewDetail={() => navigateTo('detail')}
          isAdmin={isAdmin}
          {...sharedProps}
        />
      )}
      {screen === 'detail' && (
        <UserDetailScreen
          username={username}
          onBack={() => navigateTo('registro')}
          {...sharedProps}
        />
      )}
    </div>
  );
}

/* ============================================================
   RENDER
============================================================ */

const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(<App />);
</script>
</body>
